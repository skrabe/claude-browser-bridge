<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Secure sign-in — Better Claude in Chrome</title>
  <style>
    body { font: 13px system-ui, sans-serif; margin: 0; padding: 18px; background: #1e1e1e; color: #eee; }
    h1 { font-size: 14px; margin: 0 0 6px; }
    .origin { color: #8ab4f8; font-size: 12px; margin-bottom: 12px; word-break: break-all; }
    .reason { color: #bbb; margin-bottom: 6px; }
    label { display: block; font-size: 12px; color: #bbb; margin: 12px 0 4px; }
    input { width: 100%; box-sizing: border-box; padding: 9px; border: 1px solid #444; border-radius: 6px; background: #2a2a2a; color: #eee; font-size: 14px; }
    .row { display: flex; gap: 8px; margin-top: 18px; }
    button { flex: 1; padding: 10px; border: 0; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .fill { background: #3b82f6; color: #fff; }
    .cancel { background: #3a3a3a; color: #ddd; }
    .note { margin-top: 14px; color: #777; font-size: 11px; line-height: 1.4; }
    .err { color: #f88; font-size: 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Secure sign-in</h1>
  <div class="origin" id="origin"></div>
  <div class="reason" id="reason"></div>
  <form id="form" autocomplete="off"></form>
  <div class="row">
    <button class="cancel" id="cancel" type="button">Cancel</button>
    <button class="fill" id="fill" type="button">Fill &amp; continue</button>
  </div>
  <div class="note">Claude never sees what you type here — the values are filled straight into the page and only a success/failure status is reported back.</div>
  <div class="err" id="err"></div>
  <script src="credential.js"></script>
</body>
</html>
